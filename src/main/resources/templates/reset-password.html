<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - Umbrella Event</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 10px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        padding: 40px;
        width: 100%;
        max-width: 400px;
      }

      .logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo h1 {
        color: #333;
        font-size: 24px;
        margin-bottom: 10px;
      }

      .logo p {
        color: #666;
        font-size: 14px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 5px;
        color: #333;
        font-weight: 500;
      }

      .form-group input {
        width: 100%;
        padding: 12px;
        border: 2px solid #e1e5e9;
        border-radius: 5px;
        font-size: 16px;
        transition: border-color 0.3s ease;
      }

      .form-group input:focus {
        outline: none;
        border-color: #667eea;
      }

      .password-strength {
        margin-top: 5px;
        font-size: 12px;
        color: #666;
      }

      .password-strength.weak {
        color: #e74c3c;
      }

      .password-strength.medium {
        color: #f39c12;
      }

      .password-strength.strong {
        color: #27ae60;
      }

      .error-message {
        background: #fee;
        color: #e74c3c;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 20px;
        border: 1px solid #fcd0d0;
        display: none;
      }

      .success-message {
        background: #efe;
        color: #27ae60;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 20px;
        border: 1px solid #d0fcd0;
        display: none;
      }

      .btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .btn:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }

      .loading {
        display: none;
        text-align: center;
        margin-top: 10px;
      }

      .loading::after {
        content: "";
        width: 20px;
        height: 20px;
        border: 2px solid #f3f3f3;
        border-top: 2px solid #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        display: inline-block;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .back-link {
        text-align: center;
        margin-top: 20px;
      }

      .back-link a {
        color: #667eea;
        text-decoration: none;
        font-size: 14px;
      }

      .back-link a:hover {
        text-decoration: underline;
      }

      @media (max-width: 480px) {
        .container {
          padding: 30px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <h1>Umbrella Event</h1>
        <p>Reset Your Password</p>
      </div>

      <div id="error-message" class="error-message"></div>
      <div id="success-message" class="success-message"></div>

      <form id="reset-form">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input
            type="password"
            id="newPassword"
            name="newPassword"
            required
            placeholder="Enter your new password"
          />
          <div id="password-strength" class="password-strength"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            required
            placeholder="Confirm your new password"
          />
        </div>

        <button type="submit" class="btn" id="submit-btn">
          Reset Password
        </button>
        <div class="loading" id="loading"></div>
      </form>

      <div class="back-link">
        <a href="#" onclick="goBack()">← Back to Login</a>
      </div>
    </div>

    <script>
      // Get token from URL parameters
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");

      if (!token) {
        showError("Invalid reset link. Please request a new password reset.");
        document.getElementById("reset-form").style.display = "none";
      }

      const form = document.getElementById("reset-form");
      const newPasswordInput = document.getElementById("newPassword");
      const confirmPasswordInput = document.getElementById("confirmPassword");
      const passwordStrength = document.getElementById("password-strength");
      const submitBtn = document.getElementById("submit-btn");
      const loading = document.getElementById("loading");

      // Password strength checker
      newPasswordInput.addEventListener("input", function () {
        const password = this.value;
        const strength = checkPasswordStrength(password);

        if (password.length === 0) {
          passwordStrength.textContent = "";
          passwordStrength.className = "password-strength";
        } else if (password.length < 6) {
          passwordStrength.textContent =
            "Password must be at least 6 characters";
          passwordStrength.className = "password-strength weak";
        } else if (strength < 2) {
          passwordStrength.textContent = "Weak password";
          passwordStrength.className = "password-strength weak";
        } else if (strength < 3) {
          passwordStrength.textContent = "Medium strength";
          passwordStrength.className = "password-strength medium";
        } else {
          passwordStrength.textContent = "Strong password";
          passwordStrength.className = "password-strength strong";
        }
      });

      // Form submission
      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        // Client-side validation
        if (newPassword.length < 6) {
          showError("Password must be at least 6 characters long");
          return;
        }

        if (newPassword !== confirmPassword) {
          showError("Passwords do not match");
          return;
        }

        // Show loading
        submitBtn.disabled = true;
        submitBtn.textContent = "Resetting...";
        loading.style.display = "block";
        hideMessages();

        try {
          const response = await fetch("/api/password/reset", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              token: token,
              newPassword: newPassword,
              confirmPassword: confirmPassword,
            }),
          });

          let data;
          let responseText;
          try {
            responseText = await response.text();
            data = JSON.parse(responseText);
          } catch (e) {
            data = responseText; // Plain text response
          }

          if (response.ok) {
            showSuccess(
              "Password has been reset successfully! You can now log in with your new password."
            );
            form.style.display = "none";
          } else {
            let errorMsg = "Failed to reset password. Please try again.";
            if (data && data.message) {
              errorMsg = data.message;
            } else if (typeof data === "string" && data.trim()) {
              errorMsg = data.trim();
            } else if (response.statusText) {
              errorMsg = response.statusText;
            }
            showError(errorMsg);
          }
        } catch (error) {
          showError(
            "Network error. Please check your connection and try again."
          );
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Reset Password";
          loading.style.display = "none";
        }
      });

      function checkPasswordStrength(password) {
        let strength = 0;
        if (password.length >= 8) strength++;
        if (/[a-z]/.test(password)) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;
        return strength;
      }

      function showError(message) {
        const errorDiv = document.getElementById("error-message");
        errorDiv.textContent = message;
        errorDiv.style.display = "block";
        document.getElementById("success-message").style.display = "none";
      }

      function showSuccess(message) {
        const successDiv = document.getElementById("success-message");
        successDiv.textContent = message;
        successDiv.style.display = "block";
        document.getElementById("error-message").style.display = "none";
      }

      function hideMessages() {
        document.getElementById("error-message").style.display = "none";
        document.getElementById("success-message").style.display = "none";
      }

      function goBack() {
        // Redirect to login page - adjust URL as needed
        window.location.href = "/login";
      }
    </script>
  </body>
</html>
